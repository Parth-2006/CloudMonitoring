name: Deploy Cloud Monitor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}

          script: |
            cd ~/CloudMonitoring

            git pull origin main

            sudo docker stop cloud-monitor-container || true
            sudo docker rm cloud-monitor-container || true

            sudo docker build -t cloud-monitor .

            sudo docker run -d \
              --name cloud-monitor-container \
              -p 5000:5000 \
              cloud-monitor
